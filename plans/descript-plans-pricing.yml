provider: Descript
providerId: descript
created: '2026-05-06'
modified: '2026-05-06'
reconciled: false
tags:
  - Video Editing
  - Audio Editing
  - AI
  - Transcription
  - Media
description: Descript prices the platform via tiered subscriptions (Free, Hobbyist, Creator, Business, Enterprise)
  with each tier including a monthly allotment of media transcription minutes and AI credits used by Underlord-powered
  features. API access is currently in early access and is included with paid plans at no additional cost — usage
  draws from the same media-minutes and AI-credit pool as in-app editing. Annual billing saves up to 35% vs monthly.
  reconciled false because exact API-vs-app credit attribution is not separately published.
sources:
  - https://www.descript.com/pricing
  - https://www.descript.com/api
  - https://docs.descriptapi.com/
  - https://help.descript.com/hc/en-us/articles/43370311322509-Descript-API-beta
