description: FOCUS-aligned FinOps view of Descript — a tiered SaaS subscription where consumption is metered in
  AI credits and media (transcription) minutes drawn from a shared monthly bucket per Drive. API usage during
  early access does not bill separately; it depletes the same media-minute and AI-credit pools as the in-app
  editor. reconciled false because Descript does not yet publish a granular usage / billing API to back per-meter
  reconciliation against FOCUS columns.
